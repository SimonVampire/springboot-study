server:
  port: 8080
  context-path: /study
spring:
    datasource:
        name: dev
        url: jdbc:mysql://127.0.0.1:3306/zx
        username: root
        password: 111111
        driver-class-name: com.mysql.jdbc.Driver
        filters: stat
        maxActive: 20
        initialSize: 1
        maxWait: 60000
        minIdle: 1
        timeBetweenEvictionRunsMillis: 60000
        minEvictableIdleTimeMillis: 300000
        validationQuery: select 'x'
        testWhileIdle: true
        testOnBorrow: false
        testOnReturn: false
        poolPreparedStatements: true
        maxOpenPreparedStatements: 20
mybatis:
# MyBatis XML形式配置文件路径
  mapper-locations: classpath:mapper/*.xml
# MyBatis注解形式扫描实体类路径
  type-aliases-package: cn.sevendream.springbootstudy.model
